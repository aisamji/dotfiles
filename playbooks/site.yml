- name: Configure Machine
  hosts: localhost
  gather_subset:
    - '!all'
    - local

  roles:
    - role: packages
    - role: git
      tags: [git]
    - role: neovim
      tags: [neovim]
    - role: claude-code
      tags: [claude, claude-code]
    - role: bash
      tags: [bash, shell]
    - role: dotfiles
      tags: [dotfiles]

# TODO: Make packages into their own play. Avoids noisy neighbor issues where failures in unrelated applications caused neovim handlers to fail.
