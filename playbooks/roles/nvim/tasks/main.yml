- name: Gather config files
  ansible.builtin.find:
    paths: "{{ role_path }}/files/nvim"
    recurse: true
    file_type: file
    excludes:
      - lazy-lock.json
  register: nvim_config

- name: Copy to .config/nvim
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_facts['env'].HOME }}/.config/nvim/{{ item.path | dirname |
      relpath(role_path + '/files/nvim') }}/"
    mode: "0644"
    directory_mode: "0755"
  loop: "{{ nvim_config.files }}"

- name: Symbolic link lazy-lock.json
  ansible.builtin.file:
    src: "{{ role_path }}/files/nvim/lazy-lock.json"
    dest: "{{ ansible_facts['env'].HOME }}/.config/nvim/lazy-lock.json"
    state: link
    force: true

# Lazy Commands Docs: https://lazy.folke.io/usage#-commands
- name: Lock Neovim Plugins
  ansible.builtin.command: nvim --headless "+Lazy! restore" +qa
  register: lazy_restore_cmd
  changed_when: "lazy_restore_cmd.stdout_lines | select('search', 'clone|(Previous HEAD)') | length != 0"
  # A `clone` is only done when installing new plugins
  # You only have `Previous HEAD` when checking out a different branch

- name: Clean Neovim Plugins
  ansible.builtin.command: nvim --headless "+Lazy! clean" +qa
  register: lazy_clean_cmd
  changed_when: "lazy_clean_cmd.stdout_lines | length != 0"
