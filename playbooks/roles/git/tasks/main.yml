- name: Copy .gitignore
  ansible.builtin.copy:
    src: ".gitignore"
    dest: "{{ ansible_facts['env'].HOME }}/.gitignore"
    mode: "0644"

- name: Template .gitconfig
  ansible.builtin.template:
    src: ".gitconfig.j2"
    dest: "{{ ansible_facts['env'].HOME }}/.gitconfig"
    mode: "0644"

- name: Gather conditional gitconfig directories
  ansible.builtin.find:
    paths: "{{ role_path }}/files/.gitconfig.d"
    recurse: true
    file_type: file
  register: gitconfigd

- name: Copy gitconfig directories for work
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_facts['env'].HOME }}/.gitconfig.d/{{ item.path | relpath(role_path + '/files/.gitconfig.d') }}"
    mode: "0644"
    directory_mode: "0755"
  loop: "{{ gitconfigd.files }}"
  when: purpose == "work"

- name: Clean up work gitconfig directories if not needed
  ansible.builtin.file:
    path: "{{ ansible_facts['env'].HOME }}/.gitconfig.d/{{ item.path | relpath(role_path + '/files/.gitconfig.d') }}"
    state: absent
  loop: "{{ gitconfigd.files }}"
  when: purpose != "work"
