- name: Install packages (Homebrew)
  when: ansible_facts['distribution'] == "MacOSX"
  block:
    - name: Configure taps (all purposes)
      community.general.homebrew_tap:
        name:
          - archetect/tap
          - tonedefdev/terracreds
          - warrensbox/tap
        state: present
    - name: Configure taps (work)
      when: ansible_local.identity.purpose == "work"
      community.general.homebrew_tap:
        name:
          - atlassian/acli
          - azure/kubelogin
          - derailed/k9s
          - hashicorp/tap
          - jonbito/tap
          - kcl-lang/tap
          - kyverno/chainsaw
          - p6m-dev/tap
        state: present

    - name: Collect homebrew formulas (personal)
      when: ansible_local.identity.purpose == "personal"
      ansible.builtin.set_fact:
        packages_homebrew_formulas: "{{ (packages_common + packages_personal) | selectattr('homebrew', 'defined') | map(attribute='homebrew') }}"
    - name: Collect homebrew formulas (work)
      when: ansible_local.identity.purpose == "work"
      ansible.builtin.set_fact:
        packages_homebrew_formulas: "{{ (packages_common + packages_work) | selectattr('homebrew', 'defined') | map(attribute='homebrew') }}"
    - name: Install formulas
      community.general.homebrew:
        state: present
        name: "{{ packages_homebrew_formulas }}"

    - name: Collect homebrew casks (personal)
      when: ansible_local.identity.purpose == "personal"
      ansible.builtin.set_fact:
        packages_homebrew_casks: "{{ (packages_common + packages_personal) | selectattr('homebrew_cask', 'defined') | map(attribute='homebrew_cask') }}"
    - name: Collect homebrew casks (work)
      when: ansible_local.identity.purpose == "work"
      ansible.builtin.set_fact:
        packages_homebrew_casks: "{{ (packages_common + packages_work) | selectattr('homebrew_cask', 'defined') | map(attribute='homebrew_cask') }}"
    - name: Install casks
      community.general.homebrew_cask:
        state: present
        # TODO: add ansible_become_pass to variables/vault. Remove `-K` flag in script when running.
        # sudo_password: "{{ ansible_become_pass }}"
        name: "{{ packages_homebrew_casks }}"
    # TODO: Set homebrew bash as login shell

- name: Install packages (Arch)
  when: ansible_facts['distribution'] == "Archlinux"
  become: "{{ not ansible_check_mode }}"
  block:
    - name: Collect arch packages (personal)
      when: ansible_local.identity.purpose == "personal"
      ansible.builtin.set_fact:
        packages_arch_packages: "{{ (packages_common + packages_personal) | selectattr('arch', 'defined') | map(attribute='arch') }}"
    - name: Collect arch packages (work)
      when: ansible_local.identity.purpose == "work"
      ansible.builtin.set_fact:
        packages_arch_packages: "{{ (packages_common + packages_work) | selectattr('arch', 'defined') | map(attribute='arch') }}"
    - name: Install packages
      community.general.pacman:
        state: present
        name: "{{ packages_arch_packages }}"

    - name: Create aur_builder user
      ansible.builtin.user:
        name: aur_builder
        create_home: true
        group: wheel
        shell: /sbin/nologin
    - name: Allow aur_builder to run sudo pacman without password
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/11-install-aur_builder
        line: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
        create: true
        mode: "0440"
        validate: 'visudo -cf %s'

    - name: Collect arch packages (personal)
      when: ansible_local.identity.purpose == "personal"
      ansible.builtin.set_fact:
        packages_aur_packages: "{{ (packages_common + packages_personal) | selectattr('arch_aur', 'defined') | map(attribute='arch_aur') }}"
    - name: Collect arch packages (work)
      when: ansible_local.identity.purpose == "work"
      ansible.builtin.set_fact:
        packages_aur_packages: "{{ (packages_common + packages_work) | selectattr('arch_aur', 'defined') | map(attribute='arch_aur') }}"

    - name: Install AUR packages
      become: true
      become_user: aur_builder
      kewlfft.aur.aur:
        use: auto
        state: present
        name: "{{ packages_aur_packages }}"

    - name: Enable paccache timer
      ansible.builtin.systemd:
        name: paccache.timer
        state: started
        enabled: true
        scope: system

- name: Gather fnm info
  ansible.builtin.command: fnm list
  register: packages_fnm_list
  check_mode: false
  changed_when: false

- name: Set system node as default
  ansible.builtin.command: "{% if ansible_check_mode %}echo{% else %}fnm default system{% endif %}"
  check_mode: false
  changed_when: "packages_fnm_list.stdout_lines | select('search', 'system') |
    select('search', 'default') | length == 0"

- name: Check if claude-code is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env'].HOME }}/.local/bin/claude"
  register: packages_claude_code_binary

- name: Create temp directory for claude-code build
  when: "not packages_claude_code_binary.stat.exists"
  ansible.builtin.tempfile:
    state: directory
    prefix: claude_code_build_
  register: packages_claude_code_build

- name: Install claude-code with native installer
  when: "not packages_claude_code_binary.stat.exists"
  block:
    - name: Download claude-code bootstrap script
      ansible.builtin.get_url:
        url: "https://downloads.claude.ai/claude-code-releases/bootstrap.sh"
        dest: "{{ packages_claude_code_build.path }}/bootstrap.sh"
        mode: "0700"
        checksum: "sha256:b315b46925a9bfb9422f2503dd5aa649f680832f4c076b22d87c39d578c3d830"

    - name: Run bootstrap script
      ansible.builtin.command:
        cmd: "{{ packages_claude_code_build.path }}/bootstrap.sh"
        creates: "{{ ansible_facts['env'].HOME }}/.local/bin/claude"

  always:
    - name: Clean up temp directory
      ansible.builtin.file:
        state: absent
        path: "{{ packages_claude_code_build.path }}"

- name: Install claude-code ACP plugin
  ansible.builtin.command:
    cmd: "npm install -g @agentclientprotocol/claude-agent-acp"
    creates: "{{ ansible_facts['env'].HOME }}/.local/bin/claude-agent-acp"
