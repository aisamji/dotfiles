- name: Install packages (Homebrew)
  when: ansible_facts['distribution'] == "MacOSX"
  block:
    - name: Install formulas
      community.general.homebrew:
        state: present
        name:
          - neovim
          - git
          - gh
          - bash
          - jq
          - yq
          - fzf
          - claude-code@latest
          - fnm
          - kubectl
          - yarn
          - tree-sitter-cli
    # TODO: Configure taps, casks, etc.

- name: Install packages (Arch)
  when: ansible_facts['distribution'] == "Archlinux"
  become: "{{ not ansible_check_mode }}"
  block:
    - name: Install packages
      ansible.builtin.package:
        state: present
        name:
          - neovim
          - git
          - github-cli
          - bash
          - jq
          - go-yq
          - fzf
          - fnm
          - yarn
          - tree-sitter
    # TODO: Install from AUR?

- name: Install node LTS
  ansible.builtin.command: fnm install --lts
  register: fnm_node_lts
  changed_when: "'already installed' not in fnm_node_lts.stderr"
  notify:
    - Default to Node Latest LTS

