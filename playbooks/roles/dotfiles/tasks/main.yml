- name: Symbolic link files
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "{{ ansible_facts['env'].HOME }}/{{ item }}"
    state: link
    force: true
  loop:
    - .rgignore

