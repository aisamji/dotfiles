- name: Copy config files
  ansible.builtin.copy:
    src: "{{ role_path }}/files/sddm.conf"
    dest: "/etc/sddm.conf.d/defaults.conf"
    mode: "0644"
  become: true
  when: ansible_facts['distribution'] == "Archlinux"

- name: Create config directories
  ansible.builtin.file:
    dest: "{{ ansible_facts['env'].HOME }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - ".config/just"

- name: Template justfile
  ansible.builtin.template:
    src: "justfile.j2"
    dest: "{{ ansible_facts['env'].HOME }}/.config/just/justfile"
    mode: "0644"
