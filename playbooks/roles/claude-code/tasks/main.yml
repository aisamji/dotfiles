- name: Template CLAUDE.md
  ansible.builtin.template:
    src: "CLAUDE.md.j2"
    dest: "{{ ansible_facts['env'].HOME }}/.claude/CLAUDE.md"

- name: Template settings.json
  ansible.builtin.template:
    src: "settings.json.j2"
    dest: "{{ ansible_facts['env'].HOME }}/.claude/settings.json"

- name: Symbolic link .claude/skills
  ansible.builtin.file:
    state: link
    src: "{{ role_path }}/files/skills"
    dest: "{{ ansible_facts['env'].HOME }}/.claude/skills"
    force: true

- name: Symbolic link .claude/agents
  ansible.builtin.file:
    state: link
    src: "{{ role_path }}/files/agents"
    dest: "{{ ansible_facts['env'].HOME }}/.claude/agents"
    force: true
