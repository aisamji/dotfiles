- name: Find all files in files/nvim
  ansible.builtin.find:
    paths: "{{ role_path }}/files/nvim"
    recurse: yes
    file_type: file
  register: found_files

- name: Copy files preserving structure
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_facts['env'].HOME }}/.config/nvim/{{ item.path | relpath(role_path + '/files/nvim') }}"
  loop: "{{ found_files.files }}"
